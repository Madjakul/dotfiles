# kitty/.config/kitty/kitty.conf
# Kitty terminal configuration — Gruvbox Material themed

# ====== Theme ======
# Gruvbox Material Dark Medium (pale/material colors)
include current-theme.conf

# ====== Colors ======
enable_true_color yes
window_background_opacity 1.0
colorspace sRGB

# ====== Fonts ======
# RobotoMono Nerd Font with explicit italic variants.
# The "Italic" face must be specified explicitly for proper rendering;
# "auto" sometimes picks the wrong weight or falls back to oblique.
font_family         RobotoMono Nerd Font Mono Regular
bold_font           RobotoMono Nerd Font Mono Bold
italic_font         RobotoMono Nerd Font Mono Italic
bold_italic_font    RobotoMono Nerd Font Mono Bold Italic
font_size           12.0

# If italics still render as slanted-regular instead of true italic,
# uncomment the line below to force Kitty to use the italic face:
# force_ltr no

# ====== Tab Bar ======
# Gruvbox Material styled tab bar at the top
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     round
tab_bar_min_tabs        2

# Tab colors (Gruvbox Material palette)
active_tab_foreground   #282828
active_tab_background   #a9b665
active_tab_font_style   bold
inactive_tab_foreground #d4be98
inactive_tab_background #32302f
inactive_tab_font_style normal
tab_bar_background      #1b1b1b

# Tab title: show index + title, truncate long names
tab_title_template      "{index}: {fmt.fg.default}{title[:30]}"

# ====== Window ======
window_padding_width    4
confirm_os_window_close 0
remember_window_size    yes

# ====== Performance ======
# Reduce repaint delay (helps with Neovim + tmux)
repaint_delay   10
input_delay     3

# ====== Scrollback ======
scrollback_lines 10000

# ====== Bell ======
enable_audio_bell no
visual_bell_duration 0

# ====== Keyboard Shortcuts ======
# Quick font size changes
map ctrl+plus   change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0
