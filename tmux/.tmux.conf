# tmux/.tmux.conf
# Tmux configuration — Gruvbox Material themed

# ====== General ======
# True color support (critical for gruvbox-material in Neovim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB,xterm-256color:RGB"

# Prefix: Ctrl-a (easier than Ctrl-b)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ====== Splits ======
unbind %
bind | split-window -h -c "#{pane_current_path}"  # keep working directory

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# ====== Reload ======
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ====== Pane Resizing ======
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z  # toggle maximize

# ====== Mouse & Vi Mode ======
set -g mouse on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ====== Performance ======
# Remove ESC delay (critical for Neovim)
set -sg escape-time 10

# Increase scrollback
set -g history-limit 50000

# ====== Status Bar ======
set-option -g status-position top

# ====== Plugins (TPM) ======
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "egel/tmux-gruvbox"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "tmux-plugins/tmux-resurrect"    # persist sessions across restarts
set -g @plugin "tmux-plugins/tmux-continuum"     # auto-save sessions every 15min

# Gruvbox theme variant
set -g @tmux-gruvbox "dark"

# Session persistence
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# Initialize TPM (keep at the very bottom)
run "~/.tmux/plugins/tpm/tpm"
